groups:
  - name: techshield-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: High 5xx error rate detected

      - alert: SlowAPIResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency exceeds 2 seconds

      - alert: PaymentWebhookFailures
        expr: increase(payment_webhook_failures_total[1h]) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Payment webhook processing failures detected
