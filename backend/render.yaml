services:
  - type: web
    name: tradeprompt-api
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    disk:
      name: tradeprompt-data
      mountPath: /app/data
      sizeGB: 1
