<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activated — TradePrompt AI Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #064e3b);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 12px; }
    h1 { font-size: 24px; color: #10b981; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 14px; margin-bottom: 16px; }
    .key-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
      margin: 16px 0;
      color: #6366f1;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin: 4px;
      font-size: 14px;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #334155;
      color: #f1f5f9;
    }
    .status { font-size: 13px; color: #10b981; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Pro Activated!</h1>
    <p>Your TradePrompt AI Pro subscription is now active.</p>

    <div class="key-box" id="licenseKey">—</div>

    <button class="btn" onclick="copyKey()">📋 Copy License Key</button>
    <button class="btn btn-outline" onclick="openTradingView()">📊 Open TradingView</button>

    <div class="status" id="extStatus">Activating extension...</div>
    <p style="font-size:12px;margin-top:16px;color:#64748b">
      License key is also saved automatically if extension is installed.
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const licenseKey = params.get('license_key') || '';
    const expiry = params.get('expiry') || '';
    const email = params.get('email') || '';

    document.getElementById('licenseKey').textContent = licenseKey || 'Check your email';

    function copyKey() {
      navigator.clipboard.writeText(licenseKey);
      document.getElementById('extStatus').textContent = '✓ Copied to clipboard!';
    }

    function openTradingView() {
      window.open('https://www.tradingview.com/chart/', '_blank');
    }

    async function activateExtension() {
      const statusEl = document.getElementById('extStatus');
      const extId = params.get('ext_id');
      const payload = {
        type: 'ACTIVATE_SUBSCRIPTION',
        data: {
          licenseKey,
          expiry: expiry ? new Date(expiry).getTime() : Date.now() + 30 * 24 * 60 * 60 * 1000,
          email
        }
      };

      if (extId && typeof chrome !== 'undefined' && chrome.runtime?.sendMessage) {
        try {
          await new Promise((resolve, reject) => {
            chrome.runtime.sendMessage(extId, payload, (response) => {
              if (chrome.runtime.lastError) reject(chrome.runtime.lastError);
              else resolve(response);
            });
          });
          statusEl.textContent = '✓ Extension activated automatically!';
          return;
        } catch (e) {
          console.warn('Extension activation failed:', e);
        }
      }

      statusEl.textContent = 'Copy license key → Extension Settings → Subscription → Activate';
    }

    if (licenseKey) activateExtension();
  </script>
</body>
</html>
