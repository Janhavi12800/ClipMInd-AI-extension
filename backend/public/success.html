<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activated — TradePrompt AI Pro</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    .success-card { padding: 40px; max-width: 440px; }
    .success-icon { font-size: 56px; margin-bottom: 12px; filter: drop-shadow(0 4px 12px rgba(110,207,170,0.35)); }
    .success-card h1 { font-size: 24px; color: var(--tp-success); margin-bottom: 8px; }
    .success-card p { color: var(--tp-text-muted); font-size: 14px; margin-bottom: 16px; }
    .key-box {
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--tp-border);
      border-radius: 12px;
      padding: 14px;
      font-family: ui-monospace, monospace;
      font-size: 14px;
      word-break: break-all;
      margin: 16px 0;
      color: var(--tp-primary-dark);
      box-shadow: inset 0 2px 10px rgba(143,163,243,0.08);
    }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .btn-row .btn { width: auto; margin: 4px; }
    .btn-outline { background: rgba(255,255,255,0.8); border: 1px solid var(--tp-border); color: var(--tp-text); }
    .status { font-size: 13px; color: var(--tp-success); margin-top: 12px; }
  </style>
</head>
<body class="center-page">
  <div class="checkout-card success-card">
    <div class="success-icon">🎉</div>
    <h1>Pro Activated!</h1>
    <p>Your TradePrompt AI Pro subscription is now active.</p>

    <div class="key-box" id="licenseKey">—</div>

    <div class="btn-row">
      <button class="btn btn-p" onclick="copyKey()">📋 Copy License Key</button>
      <button class="btn btn-outline" onclick="openTradingView()">📊 Open TradingView</button>
    </div>

    <div class="status" id="extStatus">Activating extension...</div>
    <p class="note" style="margin-top:16px">
      License key is also saved automatically if extension is installed.
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const licenseKey = params.get('license_key') || '';
    const expiry = params.get('expiry') || '';
    const email = params.get('email') || '';

    document.getElementById('licenseKey').textContent = licenseKey || 'Check your email';

    function copyKey() {
      navigator.clipboard.writeText(licenseKey);
      document.getElementById('extStatus').textContent = '✓ Copied to clipboard!';
    }

    function openTradingView() {
      window.open('https://www.tradingview.com/chart/', '_blank');
    }

    async function activateExtension() {
      const statusEl = document.getElementById('extStatus');
      const extId = params.get('ext_id');
      const payload = {
        type: 'ACTIVATE_SUBSCRIPTION',
        data: {
          licenseKey,
          expiry: expiry ? new Date(expiry).getTime() : Date.now() + 30 * 24 * 60 * 60 * 1000,
          email
        }
      };

      if (extId && typeof chrome !== 'undefined' && chrome.runtime?.sendMessage) {
        try {
          await new Promise((resolve, reject) => {
            chrome.runtime.sendMessage(extId, payload, (response) => {
              if (chrome.runtime.lastError) reject(chrome.runtime.lastError);
              else resolve(response);
            });
          });
          statusEl.textContent = '✓ Extension activated automatically!';
          return;
        } catch (e) {
          console.warn('Extension activation failed:', e);
        }
      }

      statusEl.textContent = 'Copy license key → Extension Settings → Subscription → Activate';
    }

    if (licenseKey) activateExtension();
  </script>
</body>
</html>
