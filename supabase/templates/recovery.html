<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Reset your password</title></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 0 auto; padding: 40px 20px;">
  <div style="text-align: center; margin-bottom: 32px;">
    <div style="display: inline-block; background: #0d9488; color: white; width: 48px; height: 48px; border-radius: 12px; line-height: 48px; font-size: 24px; font-weight: bold;">🛡</div>
    <h1 style="color: #0f172a; margin-top: 16px;">TechShield AI</h1>
  </div>
  <h2 style="color: #0f172a;">Reset your password</h2>
  <p style="color: #475569; line-height: 1.6;">We received a request to reset your password. Click the button below to choose a new password. This link expires in 1 hour.</p>
  <a href="{{ .ConfirmationURL }}" style="display: inline-block; background: #0d9488; color: white; padding: 12px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; margin: 24px 0;">Reset Password</a>
  <p style="color: #94a3b8; font-size: 14px;">If you didn't request a password reset, you can safely ignore this email.</p>
</body>
</html>
