name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install extension dependencies
        run: cd extension && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Typecheck extension
        run: cd extension && npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend
        run: cd frontend && npm ci && npm run build
        env:
          VITE_API_URL: https://placeholder.supabase.co/functions/v1
          VITE_PAYMENTS_URL: https://placeholder.supabase.co/functions/v1
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
          VITE_DEMO_MODE: 'true'

      - name: Build extension
        run: cd extension && npm ci && npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dependency audit
        run: |
          cd frontend && npm audit --audit-level=high || true
          cd ../extension && npm audit --audit-level=high || true

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci
          npx playwright install --with-deps chromium

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Serve frontend and run E2E
        run: |
          cd frontend && npx vite preview --port 5173 &
          npx wait-on http://localhost:5173 --timeout 60000
          npx playwright test --config tests/playwright.config.ts --project=chromium
        env:
          E2E_BASE_URL: http://localhost:5173
